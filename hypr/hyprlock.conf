general {
    no_fade_in = false
    grace = 0
    disable_loading = true
    hide_cursor = true
}

background {
    monitor =
    # Укажи путь к своим обоям, чтобы блюр работал красиво
    path = screenshot
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2 # 0 — без блюра
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    # outer_color = rgba(149, 117, 205, 1) # Твой фиолетовый #9575cd
    # inner_color = rgba(40, 44, 52, 0.9)  # Твой фон #282c34
    # font_color = rgb(200, 200, 200)
    fade_on_empty = true
    rounding = 0
    placeholder_text = <i>Password...</i>
    hide_input = true
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    # Часы
    text = cmd[update:1000] echo "$(date +"%H:%M:%S")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 120
    font_family = Hack Nerd Font Bold
    position = 0, 80
    halign = center
    valign = center
}

